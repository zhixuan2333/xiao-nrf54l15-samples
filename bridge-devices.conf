# bridge-devices.conf — name your debug probes so you can pick one by label.
#
# Used by (host)     scripts/host-bridge.sh --device <label|serial>
#     and (Codespace) scripts/flash.sh / serial.sh --device <label>
#
# Columns (whitespace-separated):
#   label        probe_serial     index
#
# index N offsets the ports so multiple devices run side by side:
#   gdb = 3333+N   telnet = 4444+N   serial = 4555+N
#
# Find connected probe serials with:   ./scripts/host-bridge.sh --list
# Lines starting with '#' are ignored. Edit to match YOUR probes.

